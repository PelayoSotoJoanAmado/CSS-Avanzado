<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Adaptable</title>

</head>
<body>

  <header class="header">
    <h1>Mi Dashboard</h1>

          <li>Reportes</li>
          <li>Configuración</li>
        </ul>

    <main class="content">
      <div class="cards">

        <div class="card">Tarjeta 1</div>
        <div class="card">Tarjeta 2</div>
        <div class="card">Tarjeta 3</div>
        <div class="card">Tarjeta 4</div>
        <div class="card">Tarjeta 5</div>
        <div class="card">Tarjeta 6</div>
      </div>
    </main>

  </div>

</html>
